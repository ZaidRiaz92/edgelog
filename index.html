function localParseTrade(text){

  for(const e of emap){if(e.p.test(t)){emotion=e.l;break;}}
  let setup=null;
  const smap=[{p:/\b(breakout|broke out)\b/,l:'Breakout'},{p:/\b(pullback|pull back|dip)\b/,l:'Pullback'},{p:/\b(momentum|momo)\b/,l:'Momentum'},{p:/\b(reversal|reverse|bounce)\b/,l:'Reversal'},{p:/\b(vwap)\b/,l:'VWAP'},{p:/\b(gap|gapped)\b/,l:'Gap'},{p:/\b(support|resist)\b/,l:'S/R'}];

async function generateWeeklySummary(trades){
  const wa=new Date();wa.setDate(wa.getDate()-7);
  const wt=trades.filter(t=>new Date(t.date)>=wa&&t.pnl!==null);
  if(!wt.length)return{pnl:0,winRate:0,trades:0,best:null,worst:null};
  const pnl=wt.reduce((s,t)=>s+t.pnl,0);
  const wins=wt.filter(t=>t.pnl>0);
  return{pnl,winRate:Math.round(wins.length/wt.length*100),trades:wt.length,best:wt.reduce((b,t)=>t.pnl>(b?.pnl||-Infinity)?t:b,null),worst:wt.reduce((w,t)=>t.pnl<(w?.pnl||Infinity)?t:w,null)};
}
